services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interno-prosecretaria-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_volume:/var/www/html/vendor
      - node_modules_volume:/var/www/html/node_modules
      - ./storage/app:/var/www/html/storage/app
    networks:
      - interno-network
    depends_on:
      - mysql
      - redis
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: interno-prosecretaria-nginx
    restart: unless-stopped
    ports:
      - "85:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - interno-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: interno-prosecretaria-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pedidos
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - interno-network
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    container_name: interno-prosecretaria-redis
    restart: unless-stopped
    networks:
      - interno-network
    ports:
      - "6379:6379"

networks:
  interno-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  vendor_volume:
    driver: local
  node_modules_volume:
    driver: local
