services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interno-prosecretaria-internas-prod
    env_file:
      - .env
    volumes:
      - ./storage/app:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
    depends_on:
      - db
      - redis
    networks:
      - interno-prosecretaria-network
    restart: unless-stopped
    expose:
      - "9000"

  db:
    image: mysql:8.0
    container_name: interno-prosecretaria-db-prod
    environment:
      MYSQL_DATABASE: interno-prosecretaria
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - interno-prosecretaria-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: interno-prosecretaria-redis-prod
    volumes:
      - redis_data:/data
    networks:
      - interno-prosecretaria-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: interno-prosecretaria-nginx-prod
    ports:
      - "127.0.0.1:8084:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - interno-prosecretaria-network
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

networks:
  interno-prosecretaria-network:
    driver: bridge