services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interno-prosecretaria-web-prod
    env_file:
      - .env
    ports:
      - "127.0.0.1:8085:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      - db
      - redis
    networks:
      - interno-prosecretaria-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: interno-prosecretaria-db-prod
    environment:
      MYSQL_DATABASE: interno-prosecretaria
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - interno-prosecretaria-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: interno-prosecretaria-redis-prod
    volumes:
      - redis_data:/data
    networks:
      - interno-prosecretaria-network
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

networks:
  interno-prosecretaria-network:
    driver: bridge